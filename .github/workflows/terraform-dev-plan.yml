name: Terraform Dev Plan


on:

  pull_request:
    branches:
      - main


permissions:

  id-token: write
  contents: read
  pull-requests: write


jobs:

  terraform-plan:

    name: Terraform Dev Plan
    runs-on: ubuntu-latest


    defaults:

      run:
        working-directory: terraform/environments/dev


    steps:


      - name: Checkout Repository
        uses: actions/checkout@v4



      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4

        with:

          role-to-assume: arn:aws:iam::952969969207:role/github-actions-terraform-role
          aws-region: us-east-1



      - name: Verify AWS Identity
        run: aws sts get-caller-identity



      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3



      - name: Terraform Format Check
        working-directory: .
        run: terraform fmt -check -recursive terraform



      - name: Terraform Init
        run: terraform init



      - name: Terraform Validate
        run: terraform validate



      - name: Terraform Plan
        id: terraform-plan
        run: |
          terraform plan -no-color | tee terraform-plan.txt



      - name: Add Terraform Plan Comment
        uses: marocchino/sticky-pull-request-comment@v2

        with:

          header: terraform-dev-plan

          path: terraform/environments/dev/terraform-plan.txt
